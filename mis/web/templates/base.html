<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MIS Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
  <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center gap-6">
    <span class="font-bold text-white text-lg">MIS</span>
    <a href="/ranking" class="text-gray-300 hover:text-white transition-colors">Ranking</a>
    <a href="/feed" class="text-gray-300 hover:text-white transition-colors">Feed de Dores</a>
    <a href="/alerts" class="text-gray-300 hover:text-white transition-colors relative">
      Alertas
      <span id="alerts-badge"
            hx-get="/alerts/badge"
            hx-trigger="every 30s"
            hx-swap="outerHTML">
      </span>
    </a>
  </nav>

  <main class="px-6 py-6">
    {% block content %}{% endblock %}
  </main>

  <footer class="px-6 py-4 border-t border-gray-800 text-gray-600 text-sm text-center">
    <a href="/health" class="hover:text-gray-400 transition-colors">system health</a>
  </footer>

  <script src="/static/app.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
