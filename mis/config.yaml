niches:
  - name: "Marketing Digital"
    slug: "marketing-digital"
    platforms:
      hotmart: marketing
      clickbank: marketing
      kiwify: marketing
    keywords:
      - "curso de marketing"
      - "trafego pago"
      - "funil de vendas"
    radar:
      anchor_term: "marketing digital"
      subreddits:
        - "marketing"
        - "digital_marketing"
        - "Entrepreneur"
      relevance_language: "pt"
  - name: "Emagrecimento"
    slug: "emagrecimento"
    platforms:
      hotmart: saude-e-fitness
      clickbank: health
      kiwify: saude
    keywords:
      - "emagrecer rapido"
      - "dieta low carb"
      - "perder barriga"
    radar:
      anchor_term: "emagrecer rapido"
      subreddits:
        - "loseit"
        - "Dieta"
        - "intermittentfasting"
      relevance_language: "pt"
  - name: "Financas Pessoais"
    slug: "financas-pessoais"
    platforms:
      hotmart: financas
      clickbank: investing
      kiwify: financas
    keywords:
      - "investir dinheiro"
      - "renda passiva"
      - "independencia financeira"
    radar:
      anchor_term: "independencia financeira"
      subreddits:
        - "financaspessoais"
        - "investimentos"
        - "personalfinance"
      relevance_language: "pt"
settings:
  proxy_url: ""
  proxy_list: []
  request_delay_s: 2.0
  max_retries: 3
  max_products_per_niche: 50
  scan_schedule: "0 3 * * *"
  parallel_scanners: true
  youtube_quota_daily_limit: 9000
  radar_synthesizer_offset_min: 30

spy:
  max_concurrent_spy: 3
  min_reviews: 10
