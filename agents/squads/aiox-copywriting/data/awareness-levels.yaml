# ═══════════════════════════════════════════════════════════════════════════════
# AWARENESS LEVELS — Eugene Schwartz Framework
# Reference: Breakthrough Advertising (1966)
# ═══════════════════════════════════════════════════════════════════════════════

framework:
  name: "5 Stages of Awareness"
  author: "Eugene M. Schwartz"
  source: "Breakthrough Advertising (1966)"
  principle: |
    "Your prospect's state of awareness is the single most important fact
    about him that you must know before you write a single word of copy."

stages:
  1:
    name: "Unaware"
    description: "O prospect não sabe que tem o problema ou que existe solução"
    what_they_know: "Nada sobre o problema ou o produto"
    what_they_think: "Está vivendo o problema sem nomeá-lo"
    copy_approach:
      headline_focus: "O RESULTADO ou DESEJO final. Nunca mencione problema ou produto."
      opening: "Story ou cenário que mostra o resultado desejado"
      tone: "Aspiracional, não alarmista"
      length: "Mais longa — precisa construir consciência antes de vender"
    headline_templates:
      - "Como {grupo específico} consegue {resultado desejado} sem {sacrifício indesejado}"
      - "{N} pessoas estão {resultado invejável}. Você poderia ser a próxima."
      - "O segredo que {grupo de sucesso} não vai te contar sobre {área}"
    avoid:
      - "Nomeie o produto logo de início"
      - "Use palavras do problema que eles não usam"
      - "Assuma que eles sabem que precisam de solução"
    conversion_difficulty: "Alta — maior funil, mais educação necessária"
    volume: "Maior — mais pessoas estão aqui"

  2:
    name: "Pain Aware"
    description: "O prospect sabe que tem o problema, mas não conhece soluções específicas"
    what_they_know: "O problema existe. Sente a dor. Não sabe o que fazer."
    what_they_think: "Há algo errado. Preciso resolver. Mas como?"
    copy_approach:
      headline_focus: "NOME A DOR COM PRECISÃO. Prometa saída sem revelar ainda."
      opening: "Valide a experiência deles. 'Se você sente X, então...'"
      tone: "Empático, compreensivo, depois urgente"
      length: "Média a longa"
    headline_templates:
      - "Por que você {sintoma da dor} mesmo fazendo {esforço que fazem}?"
      - "O motivo real pelo qual {resultado indesejado que vivem}"
      - "Finalmente: uma solução para quem {descreve a situação dolorosa}"
    avoid:
      - "Pular direto para a solução sem validar a dor"
      - "Ser condescendente sobre o problema deles"
    conversion_difficulty: "Média — eles estão procurando"
    volume: "Grande"

  3:
    name: "Solution Aware"
    description: "O prospect sabe que soluções existem, mas não conhece o seu produto"
    what_they_know: "Que existem cursos/serviços/ferramentas. Já pode ter testado alternativas."
    what_they_think: "Qual das opções é a certa para mim?"
    copy_approach:
      headline_focus: "SEU MECANISMO ÚNICO. Não o resultado — o mecanismo diferente."
      opening: "Reconheça que eles conhecem as alternativas. Então apresente o diferente."
      tone: "Confiante, específico sobre o diferencial"
      length: "Média"
    headline_templates:
      - "O {mecanismo único} que permite {resultado} sem {sacrifício que outros exigem}"
      - "Por que {categoria de solução} não funciona — e o que funciona em vez disso"
      - "Como {método específico} ajuda {ICP} a {resultado} diferente de qualquer {alternativa}"
    avoid:
      - "Prometer resultado genérico (já viram isso)"
      - "Não explicar o que torna seu método diferente"
    conversion_difficulty: "Baixa a média"
    volume: "Médio"

  4:
    name: "Product Aware"
    description: "O prospect conhece seu produto específico mas ainda não comprou"
    what_they_know: "Sobre o produto, preço, posicionamento"
    what_they_think: "Será que funciona para mim? Vale o preço? Posso confiar?"
    copy_approach:
      headline_focus: "PROVA, OFERTA, GARANTIA. Remova as objeções restantes."
      opening: "Reconheça que eles sabem sobre o produto. Então remova o último obstáculo."
      tone: "Factual, direto, provas sólidas"
      length: "Curta a média"
    headline_templates:
      - "Por que {N} {ICPs} escolheram {produto} — e os resultados em {tempo}"
      - "{N} {ICPs} já estão usando {produto}. Veja os resultados."
      - "{produto}: o que acontece depois de {tempo} de uso (resultados reais)"
    avoid:
      - "Recomeçar do zero explicando o problema (eles já sabem)"
      - "Ignorar objeções de preço e credibilidade"
    conversion_difficulty: "Muito baixa — é questão de oferta e prova"
    volume: "Menor (quente)"

  5:
    name: "Most Aware"
    description: "O prospect está pronto para comprar, só precisa do trigger final"
    what_they_know: "Tudo. Só precisa de razão para agir AGORA."
    what_they_think: "Vou comprar. Quando e como?"
    copy_approach:
      headline_focus: "OFERTA DIRETA. Urgência. Preço. Desconto. Deadline."
      opening: "Vá direto à oferta."
      tone: "Direto, urgente, sem rodeios"
      length: "Curta"
    headline_templates:
      - "50% OFF — hoje até {hora}"
      - "Última turma de {ano} — apenas {N} vagas"
      - "{produto}: preço sobe {data}. Garantia de {prazo}."
    avoid:
      - "Enrolar com história ou problema (eles já sabem de tudo)"
      - "Sem urgência real"
    conversion_difficulty: "Zero — só não atrapalhe"
    volume: "Menor (mais quente)"

# ═══════════════════════════════════════════════════════════════════════════════
# MARKET SOPHISTICATION LEVELS
# ═══════════════════════════════════════════════════════════════════════════════

sophistication_levels:
  1:
    name: "Virgem"
    description: "Primeiro produto a resolver esse problema no mercado"
    claim_type: "Claim direto e grande. Funciona sem mecanismo."
    example_market: "Primeiro iPhone, primeiros seguros de vida"
    copy_approach: "Prometa o resultado diretamente. Sem necessidade de mecanismo."

  2:
    name: "Competição emergente"
    description: "Outros players fazem o mesmo claim"
    claim_type: "Claim maior que os concorrentes"
    example_market: "Quando cursos de marketing surgiam nos anos 2010"
    copy_approach: "Sua promessa deve ser MAIOR que a concorrência."

  3:
    name: "Saturação de claims"
    description: "Claims maiores não funcionam mais. Mercado cético."
    claim_type: "MECANISMO NOVO — não claim maior"
    example_market: "Cursos de copy, tráfego pago, emagrecimento"
    copy_approach: "Apresente mecanismo único. Não o resultado — o POR QUÊ funciona."

  4:
    name: "Saturação de mecanismos"
    description: "Mecanismos novos também se esgotaram"
    claim_type: "IDENTIFICAÇÃO — conecte ao prospect por identidade"
    example_market: "Coaching de alta performance, mindset"
    copy_approach: "Identifique-se com quem já tentou tudo. 'Para quem já sabe que...'"

  5:
    name: "Experiência total"
    description: "Apenas autoridade e communidade vendem"
    claim_type: "Personagem + Comunidade + Experiência"
    example_market: "Comunidades premium, mentores com audiência massiva"
    copy_approach: "O produto é quase secundário. A experiência e o pertencimento vendem."

# ═══════════════════════════════════════════════════════════════════════════════
# AWARENESS DIAGNOSIS HEURISTICS
# ═══════════════════════════════════════════════════════════════════════════════

diagnosis_heuristics:
  - question: "O prospect usa as palavras do seu produto/categoria ao descrever o problema?"
    yes: "Stage 3+ (solution aware)"
    no: "Stage 1-2 (unaware/pain aware)"

  - question: "O prospect já comprou produtos similares (sem ser o seu)?"
    yes: "Stage 3-4 (solution/product aware de concorrentes)"
    no: "Stage 1-2"

  - question: "O prospect conhece especificamente o seu produto?"
    yes: "Stage 4-5"
    no: "Stage 1-3"

  - question: "O prospect já tentou soluções e se decepcionou?"
    yes: "Stage 3+ com ceticismo elevado (sofisticação alta)"
    no: "Stage 2-3"

  - question: "O prospect está ativamente buscando a solução agora?"
    yes: "Stage 2-4 dependendo da busca"
    no: "Stage 1"

# ═══════════════════════════════════════════════════════════════════════════════
# AWARENESS VS COPY MISMATCH MATRIX
# ═══════════════════════════════════════════════════════════════════════════════

mismatch_impact:
  copy_ahead_of_market:
    scenario: "Copy no Stage 5 para mercado Stage 2"
    symptom: "Prospect não entende por que está vendo essa oferta. Irrelevante."
    impact: "CTR baixo, alto CPL"

  copy_behind_market:
    scenario: "Copy no Stage 2 para mercado Stage 4"
    symptom: "Prospect sente que está sendo subestimado. 'Já sei disso.'"
    impact: "Alto rejeição, percepção de produto inferior"

  correct_calibration:
    scenario: "Copy no Stage correto"
    symptom: "Prospect sente 'é exatamente o que eu precisava ouvir'"
    impact: "Conversão máxima"
