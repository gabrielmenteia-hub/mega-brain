niches:
  - name: "Marketing Digital"
    slug: "marketing-digital"
    platforms:
      hotmart: marketing
      clickbank: marketing
      kiwify: marketing
      braip: cursos-online    # marketplace publico disponivel
      perfectpay: null        # checkout-only, sem marketplace publico
      eduzz: null             # SPA autenticado (orbita.eduzz.com), sem marketplace publico
      monetizze: null         # 403 sem login, sem marketplace publico
      product_hunt: trending  # scanner ignora o slug — retorna trending geral da plataforma
      udemy: "Marketing"      # categoria oficial Udemy Affiliate API
      jvzoo: "84"             # JVZoo usa category ID numerico — 84=Affiliate Marketing, generico
      gumroad: marketing      # tag discover Gumroad
      appsumo: marketing-sales  # categoria AppSumo /browse/software/marketing-sales/
    keywords:
      - "curso de marketing"
      - "trafego pago"
      - "funil de vendas"
    radar:
      anchor_term: "marketing digital"
      subreddits:
        - "marketing"
        - "digital_marketing"
        - "Entrepreneur"
      relevance_language: "pt"
  - name: "Emagrecimento"
    slug: "emagrecimento"
    platforms:
      hotmart: saude-e-fitness
      clickbank: health
      kiwify: saude
      braip: encapsulados     # marketplace publico disponivel
      perfectpay: null        # checkout-only, sem marketplace publico
      eduzz: null             # SPA autenticado, sem marketplace publico
      monetizze: null         # 403 sem login, sem marketplace publico
      product_hunt: trending  # scanner ignora o slug — retorna trending geral da plataforma
      udemy: "Health & Fitness"  # categoria oficial Udemy
      jvzoo: "84"             # JVZoo nao tem categoria saude especifica — usar MMO generico
      gumroad: health         # tag discover Gumroad
      appsumo: health-fitness  # categoria AppSumo /browse/software/health-fitness/
    keywords:
      - "emagrecer rapido"
      - "dieta low carb"
      - "perder barriga"
    radar:
      anchor_term: "emagrecer rapido"
      subreddits:
        - "loseit"
        - "Dieta"
        - "intermittentfasting"
      relevance_language: "pt"
  - name: "Financas Pessoais"
    slug: "financas-pessoais"
    platforms:
      hotmart: financas
      clickbank: investing
      kiwify: financas
      braip: cursos-online    # proxy — sem slug especifico de financas confirmado
      perfectpay: null        # checkout-only, sem marketplace publico
      eduzz: null             # SPA autenticado, sem marketplace publico
      monetizze: null         # 403 sem login, sem marketplace publico
      product_hunt: trending  # scanner ignora o slug — retorna trending geral da plataforma
      udemy: "Finance & Accounting"  # categoria oficial Udemy
      jvzoo: "84"             # JVZoo — mesmo motivo, sem categoria financas especifica
      gumroad: finance        # tag discover Gumroad
      appsumo: finance        # categoria AppSumo /browse/software/finance/
    keywords:
      - "investir dinheiro"
      - "renda passiva"
      - "independencia financeira"
    radar:
      anchor_term: "independencia financeira"
      subreddits:
        - "financaspessoais"
        - "investimentos"
        - "personalfinance"
      relevance_language: "pt"
settings:
  proxy_url: ""
  proxy_list: []
  request_delay_s: 2.0
  max_retries: 3
  max_products_per_niche: 50
  scan_schedule: "0 3 * * *"
  parallel_scanners: true
  youtube_quota_daily_limit: 9000
  radar_synthesizer_offset_min: 30

spy:
  max_concurrent_spy: 3
  min_reviews: 10
