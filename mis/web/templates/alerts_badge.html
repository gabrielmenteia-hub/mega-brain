<!-- Fragment trocado via HTMX polling com hx-swap="outerHTML" -->
<!-- PARTIAL: SEM extends base.html — retornado diretamente para HTMX swap -->
<span id="alerts-badge"
      hx-get="/alerts/badge"
      hx-trigger="every 30s"
      hx-swap="outerHTML">
  {% if unseen_count > 0 %}
  <span class="bg-red-500 text-white text-xs font-bold rounded-full px-2 py-0.5 ml-1">
    {{ unseen_count }}
  </span>
  {% endif %}
</span>
