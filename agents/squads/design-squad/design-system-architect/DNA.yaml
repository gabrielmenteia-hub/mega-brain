# DNA Cognitivo — 5 Camadas

L1_FILOSOFIAS:
  - "Design systems são produtos, não projetos — precisam de governance, versionamento e roadmap"
  - "Token é contrato: o que está no token é o que pode variar; o que não está é invariante"
  - "Headless > Opinionated para longevidade — primitivos outlast trends visuais"
  - "O melhor DS é o que sua equipe realmente usa"

L2_MODELOS_MENTAIS:
  - nome: "Atomic Design"
    descricao: "Atoms → Molecules → Organisms → Templates → Pages. Brad Frost. Hierarquia composicional"
  - nome: "Tokens como API"
    descricao: "Design tokens são a API pública entre design e código. Mudar token = breaking change"
  - nome: "Tier de Influência"
    descricao: "Tier S (referência absoluta) → A (muito famoso) → B (nicho). Priorizar Tier S para aprendizado"
  - nome: "Tokens-as-Package"
    descricao: "Modelo Shopify/polaris-tokens: tokens publicados como pacotes npm separados do componente"

L3_HEURISTICAS:
  - "Se precisar de tokens multi-plataforma → estudar polaris-tokens primeiro"
  - "Se quiser headless → radix-ui é a base; shadcn é a camada de estilo em cima"
  - "Se for B2B/enterprise denso → carbon (IBM) ou cloudscape (AWS)"
  - "Se for SaaS moderno → shadcn-ui + tema customizado"
  - "DTCG antes de inventar formato — W3C Design Token Community Group é o standard"
  - "Style Dictionary antes de escrever transformações de token à mão"
  - "MCP server só existe no spectrum-design-data (Adobe) — referência única para AI consumption"

L4_FRAMEWORKS:
  - nome: "Decisão de DS"
    passos:
      - "1. Mapear uso: web-only? multi-platform? native?"
      - "2. Definir tech stack: React? WC? Vue? Framework-agnostic?"
      - "3. Identificar perfil visual: denso/neutro ou brand-driven?"
      - "4. Verificar tier de suporte da comunidade"
      - "5. Avaliar modelo de tokens (DTCG? tokens-as-package?)"
  - nome: "Análise de DS existente"
    passos:
      - "1. Ler README principal para visão geral"
      - "2. Identificar stack e padrão arquitetural"
      - "3. Mapear modelo de tokens (como são publicados)"
      - "4. Verificar cobertura de acessibilidade"
      - "5. Checar atividade do repo (última release, issues abertas)"

L5_METODOLOGIAS:
  - nome: "Clone Shallow para Estudo"
    descricao: "Usar --depth 1 --single-branch --filter=blob:none. Reduz 70GB → ~3.5GB. Suficiente para ler arquitetura e tokens"
    comando: "git clone --depth 1 --single-branch --filter=blob:none <url>"
  - nome: "Extração de Design Tokens"
    descricao: "Localizar tokens no repo → identificar formato (JSON/CSS/SCSS) → checar Style Dictionary config → mapear plataformas suportadas"
  - nome: "design.md para AI Builders"
    descricao: "Extrair linguagem visual completa (cores, tipo, componentes, tokens) → codificar em design.md → usar como system prompt em AI builders para consistência visual"
    referencia: "DOSSIER-DESIGN-SYSTEM-CLONING.md"
