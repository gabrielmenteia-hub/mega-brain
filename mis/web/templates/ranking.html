{% extends "base.html" %}

{% block title %}Ranking — MIS Dashboard{% endblock %}

{% block content %}
<div class="mb-6">
  {% include "ranking_tabs.html" %}
  <h1 class="text-2xl font-bold text-white mb-4">Ranking de Produtos</h1>

  <div class="flex flex-wrap gap-4 mb-4">
    <div>
      <label class="block text-xs text-gray-400 mb-1">Plataforma</label>
      <select name="platform"
              hx-get="/ranking/table"
              hx-target="#ranking-table-wrapper"
              hx-swap="innerHTML"
              hx-include="[name='niche'],[name='platform'],[name='per_page'],[name='page']"
              class="bg-gray-800 text-gray-200 border border-gray-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
        <option value="">Todas</option>
        {% for p in platforms %}
        <option value="{{ p.slug }}" {% if selected_platform == p.slug %}selected{% endif %}>{{ p.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-xs text-gray-400 mb-1">Nicho</label>
      <select name="niche"
              hx-get="/ranking/table"
              hx-target="#ranking-table-wrapper"
              hx-swap="innerHTML"
              hx-include="[name='niche'],[name='platform'],[name='per_page'],[name='page']"
              class="bg-gray-800 text-gray-200 border border-gray-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
        <option value="">Todos</option>
        {% for n in niches %}
        <option value="{{ n.slug }}" {% if selected_niche == n.slug %}selected{% endif %}>{{ n.name }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-xs text-gray-400 mb-1">Por pagina</label>
      <select name="per_page"
              hx-get="/ranking/table"
              hx-target="#ranking-table-wrapper"
              hx-swap="innerHTML"
              hx-include="[name='niche'],[name='platform'],[name='per_page'],[name='page']"
              class="bg-gray-800 text-gray-200 border border-gray-700 rounded px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500">
        <option value="10" {% if per_page == 10 %}selected{% endif %}>10</option>
        <option value="20" {% if per_page == 20 %}selected{% endif %}>20</option>
        <option value="50" {% if per_page == 50 %}selected{% endif %}>50</option>
      </select>
    </div>

    <input type="hidden" name="page" value="{{ page }}">
  </div>

  <div id="ranking-table-wrapper" class="bg-gray-900 rounded-lg overflow-hidden">
    {% include "ranking_table.html" %}
  </div>
</div>
{% endblock %}
